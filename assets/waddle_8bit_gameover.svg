<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Game Over (RIP) -->
  
  <!-- Headphones - one ear cup fallen -->
  <rect x="6" y="3" width="2" height="3" fill="#475569"/>
  <rect x="24" y="5" width="2" height="2" fill="#475569"/>
  <rect x="8" y="2" width="16" height="2" fill="#475569"/>
  
  <!-- Headphones ears - one broken -->
  <rect x="6" y="6" width="2" height="4" fill="#64748b"/>
  <rect x="24" y="7" width="2" height="2" fill="#64748b"/>
  
  <!-- Head - tilted -->
  <rect x="8" y="4" width="16" height="2" fill="#1e293b"/>
  <rect x="7" y="6" width="18" height="2" fill="#1e293b"/>
  
  <!-- Eyes - X X (game over style) -->
  <rect x="8" y="10" width="1" height="3" fill="#ef4444"/>
  <rect x="10" y="10" width="1" height="3" fill="#ef4444"/>
  <rect x="17" y="10" width="1" height="3" fill="#ef4444"/>
  <rect x="19" y="10" width="1" height="3" fill="#ef4444"/>
  
  <!-- No blush - defeated -->
  
  <!-- Beak - closed, sad -->
  <rect x="14" y="13" width="3" height="1" fill="#f59e0b"/>
  <rect x="14" y="14" width="1" height="1" fill="#b45309"/>
  
  <!-- Body sides - slouched -->
  <rect x="6" y="12" width="2" height="8" fill="#1e293b"/>
  <rect x="24" y="12" width="2" height="8" fill="#1e293b"/>
  
  <!-- Belly - dim -->
  <rect x="10" y="15" width="12" height="7" fill="#94a3b8"/>
  <rect x="8" y="16" width="16" height="5" fill="#94a3b8"/>
  
  <!-- Wings - dropped, controller falling -->
  <rect x="3" y="15" width="3" height="4" fill="#3b82f6"/>
  <rect x="26" y="15" width="3" height="4" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="7" y="20" width="18" height="4" fill="#1e293b"/>
  <rect x="9" y="22" width="14" height="2" fill="#1e293b"/>
  
  <!-- Feet - flat, no energy -->
  <rect x="7" y="24" width="5" height="2" fill="#f59e0b"/>
  <rect x="20" y="24" width="5" height="2" fill="#f59e0b"/>
  
  <!-- Controller falling -->
  <rect x="1" y="22" width="6" height="3" fill="#475569"/>
  <rect x="2" y="23" width="1" height="1" fill="#ef4444"/>
  <rect x="4" y="23" width="1" height="1" fill="#3b82f6"/>
  
  <!-- GAME OVER text particles -->
  <rect x="2" y="2" width="1" height="1" fill="#ef4444"/>
  <rect x="29" y="2" width="1" height="1" fill="#ef4444"/>
  <rect x="1" y="3" width="1" height="1" fill="#ef4444"/>
  <rect x="30" y="3" width="1" height="1" fill="#ef4444"/>
</svg>
