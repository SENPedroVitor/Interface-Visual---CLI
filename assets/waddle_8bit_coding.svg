<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Coding with Headphones and BIG laptop! -->
  
  <!-- Headphones band -->
  <rect x="2" y="6" width="2" height="4" fill="#475569"/>
  <rect x="18" y="6" width="2" height="4" fill="#475569"/>
  <rect x="4" y="5" width="14" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="2" y="10" width="2" height="5" fill="#64748b"/>
  <rect x="18" y="10" width="2" height="5" fill="#64748b"/>
  
  <!-- Laptop screen - BIG and BRIGHT -->
  <rect x="26" y="4" width="18" height="14" fill="#334155"/>
  <rect x="28" y="6" width="14" height="10" fill="#1e40af"/>
  <!-- Code on screen - SUPER BRIGHT -->
  <rect x="29" y="7" width="6" height="1" fill="#60a5fa"/>
  <rect x="36" y="7" width="4" height="1" fill="#4ade80"/>
  <rect x="29" y="9" width="7" height="1" fill="#60a5fa"/>
  <rect x="37" y="9" width="3" height="1" fill="#4ade80"/>
  <rect x="29" y="11" width="5" height="1" fill="#4ade80"/>
  <rect x="35" y="11" width="5" height="1" fill="#60a5fa"/>
  <rect x="29" y="13" width="6" height="1" fill="#60a5fa"/>
  <!-- Laptop base -->
  <rect x="24" y="18" width="22" height="4" fill="#94a3b8"/>
  <rect x="23" y="21" width="24" height="2" fill="#64748b"/>
  
  <!-- Head -->
  <rect x="4" y="8" width="16" height="3" fill="#1e293b"/>
  <rect x="3" y="11" width="18" height="3" fill="#1e293b"/>
  
  <!-- Eyes -->
  <rect x="5" y="14" width="4" height="3" fill="#ffffff"/>
  <rect x="15" y="14" width="4" height="3" fill="#ffffff"/>
  <rect x="6" y="15" width="2" height="2" fill="#1e293b"/>
  <rect x="16" y="15" width="2" height="2" fill="#1e293b"/>
  
  <!-- Beak -->
  <rect x="10" y="17" width="4" height="2" fill="#f59e0b"/>
  
  <!-- Body -->
  <rect x="2" y="14" width="3" height="10" fill="#1e293b"/>
  <rect x="19" y="14" width="3" height="10" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="6" y="17" width="12" height="8" fill="#f1f5f9"/>
  <rect x="4" y="18" width="16" height="5" fill="#f1f5f9"/>
  
  <!-- Wings/Arms typing -->
  <rect x="0" y="16" width="4" height="5" fill="#3b82f6"/>
  <rect x="20" y="16" width="5" height="5" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="3" y="24" width="18" height="4" fill="#1e293b"/>
  
  <!-- Feet -->
  <rect x="3" y="28" width="6" height="4" fill="#f59e0b"/>
  <rect x="15" y="28" width="6" height="4" fill="#f59e0b"/>
  <rect x="2" y="31" width="8" height="3" fill="#f59e0b"/>
  <rect x="14" y="31" width="8" height="3" fill="#f59e0b"/>
</svg>
