<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Power Up! (Super Penguin Bros) -->
  
  <!-- Super Crown/Mushroom power-up effect -->
  <rect x="10" y="1" width="12" height="2" fill="#fbbf24"/>
  <rect x="8" y="2" width="2" height="2" fill="#fbbf24"/>
  <rect x="22" y="2" width="2" height="2" fill="#fbbf24"/>
  
  <!-- Sparkles from power-up -->
  <rect x="4" y="3" width="1" height="1" fill="#fbbf24"/>
  <rect x="27" y="3" width="1" height="1" fill="#fbbf24"/>
  <rect x="3" y="5" width="1" height="1" fill="#fbbf24"/>
  <rect x="28" y="5" width="1" height="1" fill="#fbbf24"/>
  
  <!-- Headphones band -->
  <rect x="6" y="3" width="2" height="3" fill="#475569"/>
  <rect x="24" y="3" width="2" height="3" fill="#475569"/>
  <rect x="8" y="2" width="16" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="6" y="6" width="2" height="4" fill="#64748b"/>
  <rect x="24" y="6" width="2" height="4" fill="#64748b"/>
  
  <!-- Head -->
  <rect x="8" y="4" width="16" height="2" fill="#1e293b"/>
  <rect x="7" y="6" width="18" height="2" fill="#1e293b"/>
  
  <!-- Eyebrows - super excited! -->
  <rect x="8" y="9" width="1" height="1" fill="#1e293b"/>
  <rect x="10" y="10" width="1" height="1" fill="#1e293b"/>
  <rect x="17" y="10" width="1" height="1" fill="#1e293b"/>
  <rect x="19" y="9" width="1" height="1" fill="#1e293b"/>
  
  <!-- Eyes - super happy ^ ^ -->
  <rect x="8" y="10" width="1" height="1" fill="#1e293b"/>
  <rect x="10" y="11" width="1" height="1" fill="#1e293b"/>
  <rect x="17" y="10" width="1" height="1" fill="#1e293b"/>
  <rect x="19" y="11" width="1" height="1" fill="#1e293b"/>
  
  <!-- Blushed cheeks - POWERED UP! -->
  <rect x="6" y="12" width="2" height="2" fill="#fca5a5" opacity="0.9"/>
  <rect x="24" y="12" width="2" height="2" fill="#fca5a5" opacity="0.9"/>
  
  <!-- Beak - open, cheering -->
  <rect x="14" y="12" width="3" height="3" fill="#f59e0b"/>
  
  <!-- Body sides -->
  <rect x="6" y="12" width="2" height="8" fill="#1e293b"/>
  <rect x="24" y="12" width="2" height="8" fill="#1e293b"/>
  
  <!-- Belly - glowing -->
  <rect x="10" y="15" width="12" height="7" fill="#fef3c7"/>
  <rect x="8" y="16" width="16" height="5" fill="#fef3c7"/>
  
  <!-- Wings up - POWER! -->
  <rect x="3" y="11" width="3" height="5" fill="#3b82f6"/>
  <rect x="26" y="11" width="3" height="5" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="7" y="20" width="18" height="4" fill="#1e293b"/>
  <rect x="9" y="22" width="14" height="2" fill="#1e293b"/>
  
  <!-- Feet - jumping! -->
  <rect x="7" y="25" width="5" height="2" fill="#f59e0b"/>
  <rect x="20" y="25" width="5" height="2" fill="#f59e0b"/>
  
  <!-- Jump shadow -->
  <rect x="6" y="28" width="6" height="1" fill="#475569" opacity="0.4"/>
  <rect x="19" y="28" width="6" height="1" fill="#475569" opacity="0.4"/>
  
  <!-- 1-UP effect -->
  <rect x="1" y="8" width="2" height="1" fill="#22c55e"/>
  <rect x="2" y="9" width="1" height="2" fill="#22c55e"/>
  <rect x="29" y="8" width="2" height="1" fill="#22c55e"/>
  <rect x="28" y="9" width="1" height="2" fill="#22c55e"/>
</svg>
