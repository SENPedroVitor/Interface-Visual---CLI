<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Success with Eyebrows and Blush -->
  
  <!-- Headphones band -->
  <rect x="5" y="5" width="2" height="3" fill="#475569"/>
  <rect x="25" y="5" width="2" height="3" fill="#475569"/>
  <rect x="7" y="4" width="18" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="5" y="8" width="2" height="4" fill="#64748b"/>
  <rect x="25" y="8" width="2" height="4" fill="#64748b"/>
  
  <!-- Sparkles/stars -->
  <rect x="3" y="4" width="1" height="1" fill="#fbbf24"/>
  <rect x="4" y="5" width="1" height="1" fill="#fbbf24"/>
  <rect x="5" y="4" width="1" height="1" fill="#fbbf24"/>
  <rect x="4" y="3" width="1" height="1" fill="#fbbf24"/>
  <rect x="25" y="5" width="1" height="1" fill="#fbbf24"/>
  <rect x="26" y="6" width="1" height="1" fill="#fbbf24"/>
  <rect x="27" y="5" width="1" height="1" fill="#fbbf24"/>
  <rect x="26" y="4" width="1" height="1" fill="#fbbf24"/>
  
  <!-- Head happy -->
  <rect x="7" y="6" width="14" height="2" fill="#1e293b"/>
  <rect x="6" y="8" width="16" height="2" fill="#1e293b"/>
  
  <!-- Eyebrows happy - curved down -->
  <rect x="8" y="9" width="1" height="1" fill="#1e293b"/>
  <rect x="10" y="10" width="1" height="1" fill="#1e293b"/>
  <rect x="17" y="10" width="1" height="1" fill="#1e293b"/>
  <rect x="19" y="9" width="1" height="1" fill="#1e293b"/>
  
  <!-- Eyes happy closed ^ ^ -->
  <rect x="8" y="10" width="1" height="1" fill="#1e293b"/>
  <rect x="10" y="11" width="1" height="1" fill="#1e293b"/>
  <rect x="17" y="10" width="1" height="1" fill="#1e293b"/>
  <rect x="19" y="11" width="1" height="1" fill="#1e293b"/>
  
  <!-- Blushed cheeks - excited -->
  <rect x="6" y="12" width="2" height="2" fill="#fca5a5" opacity="0.7"/>
  <rect x="24" y="12" width="2" height="2" fill="#fca5a5" opacity="0.7"/>
  
  <!-- Beak open happy -->
  <rect x="12" y="12" width="3" height="2" fill="#f59e0b"/>
  
  <!-- Body jumping -->
  <rect x="5" y="12" width="2" height="7" fill="#1e293b"/>
  <rect x="21" y="12" width="2" height="7" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="9" y="14" width="10" height="6" fill="#f1f5f9"/>
  <rect x="7" y="15" width="14" height="4" fill="#f1f5f9"/>
  
  <!-- Wings up victory -->
  <rect x="3" y="9" width="3" height="5" fill="#3b82f6"/>
  <rect x="22" y="9" width="3" height="5" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="6" y="19" width="16" height="3" fill="#1e293b"/>
  
  <!-- Feet off ground jumping -->
  <rect x="6" y="23" width="5" height="2" fill="#f59e0b"/>
  <rect x="17" y="23" width="5" height="2" fill="#f59e0b"/>
  
  <!-- Jump shadow -->
  <rect x="5" y="26" width="6" height="1" fill="#475569" opacity="0.4"/>
  <rect x="17" y="26" width="6" height="1" fill="#475569" opacity="0.4"/>
</svg>
