<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Typing/Coding State with Headphones -->
  
  <!-- Headphones band -->
  <rect x="5" y="5" width="2" height="3" fill="#475569"/>
  <rect x="25" y="5" width="2" height="3" fill="#475569"/>
  <rect x="7" y="4" width="18" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="5" y="8" width="2" height="4" fill="#64748b"/>
  <rect x="25" y="8" width="2" height="4" fill="#64748b"/>
  
  <!-- Keyboard -->
  <rect x="4" y="20" width="24" height="4" fill="#475569"/>
  <rect x="5" y="21" width="2" height="2" fill="#94a3b8"/>
  <rect x="8" y="21" width="2" height="2" fill="#94a3b8"/>
  <rect x="11" y="21" width="2" height="2" fill="#94a3b8"/>
  <rect x="14" y="21" width="2" height="2" fill="#94a3b8"/>
  <rect x="17" y="21" width="2" height="2" fill="#94a3b8"/>
  <rect x="20" y="21" width="2" height="2" fill="#94a3b8"/>
  <rect x="23" y="21" width="2" height="2" fill="#94a3b8"/>
  
  <!-- Head focused -->
  <rect x="7" y="6" width="14" height="2" fill="#1e293b"/>
  <rect x="6" y="8" width="16" height="2" fill="#1e293b"/>
  
  <!-- Eyes focused on keyboard -->
  <rect x="8" y="10" width="3" height="2" fill="#ffffff"/>
  <rect x="17" y="10" width="3" height="2" fill="#ffffff"/>
  <rect x="9" y="11" width="2" height="1" fill="#1e293b"/>
  <rect x="18" y="11" width="2" height="1" fill="#1e293b"/>
  
  <!-- Beak concentrated -->
  <rect x="12" y="12" width="3" height="1" fill="#f59e0b"/>
  
  <!-- Body leaning forward -->
  <rect x="5" y="12" width="2" height="7" fill="#1e293b"/>
  <rect x="21" y="12" width="2" height="7" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="9" y="14" width="10" height="6" fill="#f1f5f9"/>
  <rect x="7" y="15" width="14" height="4" fill="#f1f5f9"/>
  
  <!-- Wings typing -->
  <rect x="3" y="14" width="3" height="5" fill="#3b82f6"/>
  <rect x="22" y="14" width="3" height="5" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="6" y="19" width="16" height="2" fill="#1e293b"/>
  
  <!-- Feet back -->
  <rect x="6" y="21" width="5" height="2" fill="#f59e0b"/>
  <rect x="17" y="21" width="5" height="2" fill="#f59e0b"/>
</svg>
