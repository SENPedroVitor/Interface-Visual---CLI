<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Tired/Sleepy Pose with Headphones Pokémon GBA style -->
  
  <!-- Headphones band - slightly droopy -->
  <rect x="6" y="5" width="2" height="3" fill="#475569"/>
  <rect x="24" y="6" width="2" height="3" fill="#475569"/>
  <rect x="8" y="4" width="16" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="6" y="8" width="2" height="4" fill="#64748b"/>
  <rect x="24" y="9" width="2" height="4" fill="#64748b"/>
  
  <!-- Zzz sleep indicators -->
  <rect x="26" y="4" width="2" height="2" fill="#94a3b8"/>
  <rect x="28" y="6" width="2" height="2" fill="#94a3b8"/>
  <rect x="27" y="8" width="2" height="2" fill="#94a3b8"/>
  
  <!-- Head (droopy) -->
  <rect x="8" y="7" width="16" height="2" fill="#1e293b"/>
  <rect x="7" y="9" width="18" height="2" fill="#1e293b"/>
  
  <!-- Eyes tired (half closed) -->
  <rect x="9" y="11" width="3" height="1" fill="#ffffff"/>
  <rect x="20" y="11" width="3" height="1" fill="#ffffff"/>
  <rect x="10" y="11" width="1" height="1" fill="#1e293b"/>
  <rect x="21" y="11" width="1" height="1" fill="#1e293b"/>
  
  <!-- Beak small -->
  <rect x="14" y="13" width="4" height="2" fill="#f59e0b"/>
  
  <!-- Body (slouched) -->
  <rect x="6" y="13" width="2" height="6" fill="#1e293b"/>
  <rect x="24" y="13" width="2" height="6" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="10" y="15" width="12" height="6" fill="#f1f5f9"/>
  <rect x="8" y="16" width="16" height="4" fill="#f1f5f9"/>
  
  <!-- Wings droopy -->
  <rect x="4" y="14" width="3" height="3" fill="#3b82f6"/>
  <rect x="25" y="14" width="3" height="3" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="7" y="19" width="18" height="3" fill="#1e293b"/>
  
  <!-- Feet -->
  <rect x="7" y="22" width="5" height="3" fill="#f59e0b"/>
  <rect x="20" y="22" width="5" height="3" fill="#f59e0b"/>
  <rect x="6" y="24" width="7" height="2" fill="#f59e0b"/>
  <rect x="19" y="24" width="7" height="2" fill="#f59e0b"/>
</svg>
