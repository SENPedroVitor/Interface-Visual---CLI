<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Morning Coffee with Headphones Pokémon GBA style -->
  
  <!-- Headphones band -->
  <rect x="5" y="4" width="2" height="3" fill="#475569"/>
  <rect x="25" y="4" width="2" height="3" fill="#475569"/>
  <rect x="7" y="3" width="18" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="5" y="7" width="2" height="4" fill="#64748b"/>
  <rect x="25" y="7" width="2" height="4" fill="#64748b"/>
  
  <!-- Coffee cup steam -->
  <rect x="24" y="4" width="1" height="2" fill="#94a3b8"/>
  <rect x="26" y="3" width="1" height="2" fill="#94a3b8"/>
  <rect x="25" y="5" width="1" height="2" fill="#94a3b8"/>
  
  <!-- Coffee cup -->
  <rect x="23" y="8" width="6" height="5" fill="#92400e"/>
  <rect x="29" y="9" width="1" height="3" fill="#78350f"/>
  <rect x="24" y="9" width="4" height="1" fill="#b45309"/>
  
  <!-- Head -->
  <rect x="6" y="6" width="14" height="2" fill="#1e293b"/>
  <rect x="5" y="8" width="16" height="2" fill="#1e293b"/>
  
  <!-- Eyes happy -->
  <rect x="7" y="10" width="3" height="2" fill="#ffffff"/>
  <rect x="16" y="10" width="3" height="2" fill="#ffffff"/>
  <rect x="8" y="11" width="2" height="1" fill="#1e293b"/>
  <rect x="17" y="11" width="2" height="1" fill="#1e293b"/>
  
  <!-- Beak open -->
  <rect x="11" y="12" width="4" height="2" fill="#f59e0b"/>
  
  <!-- Body -->
  <rect x="4" y="12" width="2" height="7" fill="#1e293b"/>
  <rect x="20" y="12" width="2" height="7" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="8" y="14" width="10" height="6" fill="#f1f5f9"/>
  <rect x="6" y="15" width="14" height="4" fill="#f1f5f9"/>
  
  <!-- Wings up excited -->
  <rect x="2" y="11" width="3" height="4" fill="#3b82f6"/>
  <rect x="21" y="11" width="3" height="4" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="5" y="19" width="16" height="3" fill="#1e293b"/>
  
  <!-- Feet -->
  <rect x="4" y="22" width="6" height="3" fill="#f59e0b"/>
  <rect x="16" y="22" width="6" height="3" fill="#f59e0b"/>
  <rect x="3" y="24" width="8" height="2" fill="#f59e0b"/>
  <rect x="15" y="24" width="8" height="2" fill="#f59e0b"/>
</svg>
