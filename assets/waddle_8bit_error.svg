<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Error with Eyebrows and Sweat -->
  
  <!-- Headphones band - slightly tilted -->
  <rect x="6" y="5" width="2" height="3" fill="#475569"/>
  <rect x="24" y="6" width="2" height="3" fill="#475569"/>
  <rect x="8" y="4" width="16" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="6" y="8" width="2" height="4" fill="#64748b"/>
  <rect x="24" y="9" width="2" height="4" fill="#64748b"/>
  
  <!-- Question marks above head -->
  <rect x="13" y="2" width="2" height="2" fill="#f59e0b"/>
  <rect x="16" y="3" width="1" height="1" fill="#f59e0b"/>
  <rect x="13" y="4" width="1" height="1" fill="#f59e0b"/>
  
  <!-- Head tilted -->
  <rect x="8" y="6" width="14" height="2" fill="#1e293b"/>
  <rect x="7" y="8" width="16" height="2" fill="#1e293b"/>
  
  <!-- Eyebrows confused - angled differently -->
  <rect x="8" y="9" width="1" height="1" fill="#1e293b"/>
  <rect x="10" y="8" width="1" height="1" fill="#1e293b"/>
  <rect x="18" y="9" width="1" height="1" fill="#1e293b"/>
  <rect x="20" y="10" width="1" height="1" fill="#1e293b"/>
  
  <!-- Eyes confused - X X -->
  <rect x="8" y="10" width="3" height="2" fill="#ffffff"/>
  <rect x="17" y="10" width="3" height="2" fill="#ffffff"/>
  <rect x="8" y="10" width="1" height="2" fill="#ef4444"/>
  <rect x="10" y="10" width="1" height="2" fill="#ef4444"/>
  <rect x="17" y="10" width="1" height="2" fill="#ef4444"/>
  <rect x="19" y="10" width="1" height="2" fill="#ef4444"/>
  
  <!-- Blushed cheeks - embarrassed -->
  <rect x="6" y="12" width="2" height="2" fill="#fca5a5" opacity="0.8"/>
  <rect x="24" y="12" width="2" height="2" fill="#fca5a5" opacity="0.8"/>
  
  <!-- Beak worried -->
  <rect x="12" y="12" width="3" height="1" fill="#f59e0b"/>
  <rect x="12" y="13" width="1" height="1" fill="#b45309"/>
  
  <!-- Sweat drop -->
  <rect x="20" y="7" width="1" height="2" fill="#60a5fa"/>
  <rect x="21" y="8" width="1" height="1" fill="#60a5fa"/>
  
  <!-- Body nervous -->
  <rect x="5" y="12" width="2" height="7" fill="#1e293b"/>
  <rect x="21" y="12" width="2" height="7" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="9" y="14" width="10" height="6" fill="#f1f5f9"/>
  <rect x="7" y="15" width="14" height="4" fill="#f1f5f9"/>
  
  <!-- Wings shrugging -->
  <rect x="3" y="11" width="3" height="4" fill="#3b82f6"/>
  <rect x="22" y="11" width="3" height="4" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="6" y="19" width="16" height="3" fill="#1e293b"/>
  
  <!-- Feet shuffled -->
  <rect x="5" y="22" width="6" height="3" fill="#f59e0b"/>
  <rect x="17" y="22" width="6" height="3" fill="#f59e0b"/>
  <rect x="4" y="24" width="8" height="2" fill="#f59e0b"/>
  <rect x="16" y="24" width="8" height="2" fill="#f59e0b"/>
</svg>
