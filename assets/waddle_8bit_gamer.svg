<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Gamer Mode! -->
  
  <!-- Headphones band -->
  <rect x="6" y="3" width="2" height="3" fill="#475569"/>
  <rect x="24" y="3" width="2" height="3" fill="#475569"/>
  <rect x="8" y="2" width="16" height="2" fill="#475569"/>
  
  <!-- Headphones ears - gaming headset with mic -->
  <rect x="6" y="6" width="2" height="4" fill="#64748b"/>
  <rect x="24" y="6" width="2" height="4" fill="#64748b"/>
  <rect x="5" y="8" width="1" height="3" fill="#ef4444"/>  <!-- LED red -->
  
  <!-- Head -->
  <rect x="8" y="4" width="16" height="2" fill="#1e293b"/>
  <rect x="7" y="6" width="18" height="2" fill="#1e293b"/>
  
  <!-- Eyebrows - focused gamer -->
  <rect x="9" y="9" width="2" height="1" fill="#1e293b"/>
  <rect x="21" y="9" width="2" height="1" fill="#1e293b"/>
  
  <!-- Eyes - focused, pupils dilated -->
  <rect x="8" y="10" width="4" height="3" fill="#ffffff"/>
  <rect x="20" y="10" width="4" height="3" fill="#ffffff"/>
  <rect x="10" y="11" width="2" height="2" fill="#1e293b"/>
  <rect x="22" y="11" width="2" height="2" fill="#1e293b"/>
  
  <!-- Blushed cheeks - excited -->
  <rect x="6" y="13" width="2" height="1" fill="#fca5a5" opacity="0.6"/>
  <rect x="24" y="13" width="2" height="1" fill="#fca5a5" opacity="0.6"/>
  
  <!-- Beak - open, concentrated -->
  <rect x="14" y="13" width="3" height="2" fill="#f59e0b"/>
  
  <!-- Body sides -->
  <rect x="6" y="12" width="2" height="8" fill="#1e293b"/>
  <rect x="24" y="12" width="2" height="8" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="10" y="15" width="12" height="7" fill="#f1f5f9"/>
  <rect x="8" y="16" width="16" height="5" fill="#f1f5f9"/>
  
  <!-- Wings holding controller -->
  <rect x="4" y="14" width="3" height="5" fill="#3b82f6"/>
  <rect x="25" y="14" width="3" height="5" fill="#3b82f6"/>
  
  <!-- Game controller -->
  <rect x="2" y="18" width="10" height="4" fill="#475569"/>
  <rect x="3" y="19" width="2" height="2" fill="#ef4444"/>  <!-- A button -->
  <rect x="6" y="19" width="2" height="2" fill="#3b82f6"/>  <!-- B button -->
  <rect x="9" y="19" width="2" height="1" fill="#94a3b8"/>  <!-- D-pad -->
  
  <!-- Body bottom -->
  <rect x="7" y="20" width="18" height="4" fill="#1e293b"/>
  <rect x="9" y="22" width="14" height="2" fill="#1e293b"/>
  
  <!-- Feet - excited, tapping -->
  <rect x="7" y="24" width="5" height="3" fill="#f59e0b"/>
  <rect x="20" y="24" width="5" height="3" fill="#f59e0b"/>
  <rect x="6" y="26" width="7" height="2" fill="#f59e0b"/>
  <rect x="19" y="26" width="7" height="2" fill="#f59e0b"/>
  
  <!-- Game particles - A button press effect -->
  <rect x="1" y="17" width="1" height="1" fill="#ef4444" opacity="0.8"/>
  <rect x="12" y="17" width="1" height="1" fill="#3b82f6" opacity="0.8"/>
</svg>
