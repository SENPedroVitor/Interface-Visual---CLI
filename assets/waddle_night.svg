<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Night Sleeping Pokémon GBA style -->
  
  <!-- Moon -->
  <rect x="22" y="3" width="4" height="4" fill="#fef3c7"/>
  <rect x="21" y="4" width="1" height="2" fill="#fef3c7"/>
  <rect x="26" y="4" width="1" height="2" fill="#fef3c7"/>
  
  <!-- Stars -->
  <rect x="4" y="3" width="1" height="1" fill="#fef3c7"/>
  <rect x="6" y="5" width="1" height="1" fill="#fef3c7"/>
  <rect x="3" y="6" width="1" height="1" fill="#fef3c7"/>
  
  <!-- Zzz -->
  <rect x="3" y="8" width="2" height="2" fill="#c7d2fe"/>
  <rect x="2" y="10" width="1" height="1" fill="#c7d2fe"/>
  
  <!-- Night cap -->
  <rect x="10" y="4" width="12" height="3" fill="#818cf8"/>
  <rect x="8" y="6" width="16" height="2" fill="#818cf8"/>
  <rect x="20" y="3" width="3" height="3" fill="#c7d2fe"/>
  
  <!-- Head -->
  <rect x="6" y="7" width="14" height="2" fill="#1e293b"/>
  <rect x="5" y="9" width="16" height="2" fill="#1e293b"/>
  
  <!-- Eyes closed -->
  <rect x="8" y="11" width="3" height="1" fill="#ffffff"/>
  <rect x="15" y="11" width="3" height="1" fill="#ffffff"/>
  
  <!-- Beak small -->
  <rect x="12" y="13" width="3" height="2" fill="#f59e0b"/>
  
  <!-- Body (lying on pillow) -->
  <rect x="4" y="14" width="2" height="6" fill="#1e293b"/>
  <rect x="20" y="14" width="2" height="6" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="8" y="16" width="10" height="5" fill="#f1f5f9"/>
  <rect x="6" y="17" width="14" height="3" fill="#f1f5f9"/>
  
  <!-- Wings tucked -->
  <rect x="2" y="15" width="3" height="3" fill="#3b82f6"/>
  <rect x="21" y="15" width="3" height="3" fill="#3b82f6"/>
  
  <!-- Pillow -->
  <rect x="3" y="20" width="20" height="3" fill="#a5b4fc"/>
  
  <!-- Body bottom -->
  <rect x="5" y="20" width="16" height="2" fill="#1e293b"/>
  
  <!-- Feet -->
  <rect x="6" y="22" width="5" height="2" fill="#f59e0b"/>
  <rect x="16" y="22" width="5" height="2" fill="#f59e0b"/>
</svg>
