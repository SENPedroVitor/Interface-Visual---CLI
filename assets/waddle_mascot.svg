<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bodyGrad" x1="40" y1="40" x2="160" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="70" y1="80" x2="130" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="beakGrad" x1="90" y1="100" x2="110" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  
  <!-- Body -->
  <ellipse cx="100" cy="110" rx="55" ry="70" fill="url(#bodyGrad)"/>
  
  <!-- White belly -->
  <ellipse cx="100" cy="120" rx="38" ry="50" fill="url(#bellyGrad)"/>
  
  <!-- Eyes -->
  <ellipse cx="82" cy="75" rx="12" ry="14" fill="#f1f5f9"/>
  <ellipse cx="118" cy="75" rx="12" ry="14" fill="#f1f5f9"/>
  <circle cx="84" cy="77" r="6" fill="#1e293b"/>
  <circle cx="120" cy="77" r="6" fill="#1e293b"/>
  <circle cx="86" cy="75" r="2" fill="#ffffff"/>
  <circle cx="122" cy="75" r="2" fill="#ffffff"/>
  
  <!-- Beak -->
  <path d="M92 95 L108 95 L100 108 Z" fill="url(#beakGrad)"/>
  
  <!-- Wings -->
  <ellipse cx="50" cy="110" rx="14" ry="25" fill="#1e293b" transform="rotate(-15 50 110)"/>
  <ellipse cx="150" cy="110" rx="14" ry="25" fill="#1e293b" transform="rotate(15 150 110)"/>
  
  <!-- Feet -->
  <ellipse cx="80" cy="175" rx="12" ry="6" fill="#f59e0b"/>
  <ellipse cx="120" cy="175" rx="12" ry="6" fill="#f59e0b"/>
  
  <!-- Blush -->
  <ellipse cx="70" cy="90" rx="5" ry="3" fill="#f472b6" opacity="0.4"/>
  <ellipse cx="130" cy="90" rx="5" ry="3" fill="#f472b6" opacity="0.4"/>
</svg>
