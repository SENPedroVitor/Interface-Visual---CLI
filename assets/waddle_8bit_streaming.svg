<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Streaming with Eyebrows Focused -->
  
  <!-- Headphones band -->
  <rect x="5" y="5" width="2" height="3" fill="#475569"/>
  <rect x="25" y="5" width="2" height="3" fill="#475569"/>
  <rect x="7" y="4" width="18" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="5" y="8" width="2" height="4" fill="#64748b"/>
  <rect x="25" y="8" width="2" height="4" fill="#64748b"/>
  
  <!-- Scroll/text lines -->
  <rect x="20" y="8" width="8" height="10" fill="#f1f5f9"/>
  <rect x="21" y="9" width="6" height="1" fill="#475569"/>
  <rect x="21" y="11" width="6" height="1" fill="#475569"/>
  <rect x="21" y="13" width="6" height="1" fill="#475569"/>
  <rect x="21" y="15" width="4" height="1" fill="#475569"/>
  
  <!-- Head looking at scroll -->
  <rect x="6" y="7" width="14" height="2" fill="#1e293b"/>
  <rect x="5" y="9" width="16" height="2" fill="#1e293b"/>
  
  <!-- Eyebrows focused - lowered -->
  <rect x="7" y="10" width="3" height="1" fill="#1e293b"/>
  <rect x="16" y="10" width="3" height="1" fill="#1e293b"/>
  
  <!-- Eyes reading -->
  <rect x="7" y="11" width="3" height="2" fill="#ffffff"/>
  <rect x="16" y="11" width="3" height="2" fill="#ffffff"/>
  <rect x="8" y="12" width="2" height="1" fill="#1e293b"/>
  <rect x="17" y="12" width="2" height="1" fill="#1e293b"/>
  
  <!-- Blushed cheeks - concentrated -->
  <rect x="5" y="13" width="2" height="1" fill="#fca5a5" opacity="0.5"/>
  <rect x="25" y="13" width="2" height="1" fill="#fca5a5" opacity="0.5"/>
  
  <!-- Beak focused -->
  <rect x="11" y="13" width="3" height="1" fill="#f59e0b"/>
  
  <!-- Body -->
  <rect x="4" y="13" width="2" height="7" fill="#1e293b"/>
  <rect x="18" y="13" width="2" height="7" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="8" y="15" width="10" height="6" fill="#f1f5f9"/>
  <rect x="6" y="16" width="14" height="4" fill="#f1f5f9"/>
  
  <!-- Wings holding scroll -->
  <rect x="2" y="13" width="3" height="5" fill="#3b82f6"/>
  <rect x="19" y="13" width="3" height="5" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="5" y="20" width="16" height="3" fill="#1e293b"/>
  
  <!-- Feet -->
  <rect x="4" y="23" width="6" height="3" fill="#f59e0b"/>
  <rect x="16" y="23" width="6" height="3" fill="#f59e0b"/>
  <rect x="3" y="25" width="8" height="2" fill="#f59e0b"/>
  <rect x="15" y="25" width="8" height="2" fill="#f59e0b"/>
</svg>
