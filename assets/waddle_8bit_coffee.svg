<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Coffee Time with Headphones! -->
  
  <!-- Headphones band -->
  <rect x="4" y="6" width="2" height="4" fill="#475569"/>
  <rect x="22" y="6" width="2" height="4" fill="#475569"/>
  <rect x="6" y="5" width="16" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="4" y="10" width="2" height="5" fill="#64748b"/>
  <rect x="22" y="10" width="2" height="5" fill="#64748b"/>
  
  <!-- Coffee cup steam -->
  <rect x="32" y="6" width="1" height="2" fill="#94a3b8"/>
  <rect x="34" y="5" width="1" height="2" fill="#94a3b8"/>
  <rect x="33" y="7" width="1" height="2" fill="#94a3b8"/>
  
  <!-- Coffee mug - BIG -->
  <rect x="30" y="18" width="2" height="8" fill="#78350f"/>
  <rect x="32" y="18" width="8" height="2" fill="#92400e"/>
  <rect x="40" y="18" width="2" height="8" fill="#78350f"/>
  <rect x="32" y="20" width="8" height="6" fill="#b45309"/>
  <rect x="32" y="21" width="7" height="1" fill="#92400e"/>
  <rect x="32" y="23" width="8" height="1" fill="#92400e"/>
  <!-- Coffee liquid -->
  <rect x="33" y="19" width="6" height="1" fill="#451a03"/>
  <!-- Handle -->
  <rect x="42" y="20" width="2" height="1" fill="#92400e"/>
  <rect x="44" y="20" width="1" height="3" fill="#92400e"/>
  <rect x="42" y="23" width="2" height="1" fill="#92400e"/>
  
  <!-- Head -->
  <rect x="6" y="8" width="16" height="3" fill="#1e293b"/>
  <rect x="5" y="11" width="18" height="3" fill="#1e293b"/>
  
  <!-- Eyes happy -->
  <rect x="7" y="14" width="4" height="3" fill="#ffffff"/>
  <rect x="17" y="14" width="4" height="3" fill="#ffffff"/>
  <rect x="8" y="15" width="2" height="2" fill="#1e293b"/>
  <rect x="18" y="15" width="2" height="2" fill="#1e293b"/>
  
  <!-- Beak smiling -->
  <rect x="12" y="17" width="4" height="2" fill="#f59e0b"/>
  
  <!-- Body -->
  <rect x="4" y="14" width="3" height="10" fill="#1e293b"/>
  <rect x="21" y="14" width="3" height="10" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="8" y="17" width="12" height="8" fill="#f1f5f9"/>
  <rect x="6" y="18" width="16" height="5" fill="#f1f5f9"/>
  
  <!-- Wing holding coffee mug -->
  <rect x="22" y="16" width="8" height="4" fill="#3b82f6"/>
  <rect x="28" y="18" width="3" height="3" fill="#3b82f6"/>
  
  <!-- Other wing relaxed -->
  <rect x="2" y="16" width="4" height="5" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="5" y="24" width="18" height="4" fill="#1e293b"/>
  
  <!-- Feet -->
  <rect x="5" y="28" width="6" height="4" fill="#f59e0b"/>
  <rect x="17" y="28" width="6" height="4" fill="#f59e0b"/>
  <rect x="4" y="31" width="8" height="3" fill="#f59e0b"/>
  <rect x="16" y="31" width="8" height="3" fill="#f59e0b"/>
</svg>
