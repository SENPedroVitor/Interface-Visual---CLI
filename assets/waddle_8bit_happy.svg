<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Happy Pose with Headphones Pokémon GBA style -->
  
  <!-- Headphones band -->
  <rect x="6" y="4" width="2" height="3" fill="#475569"/>
  <rect x="24" y="4" width="2" height="3" fill="#475569"/>
  <rect x="8" y="3" width="16" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="6" y="7" width="2" height="4" fill="#64748b"/>
  <rect x="24" y="7" width="2" height="4" fill="#64748b"/>
  
  <!-- Arms up left -->
  <rect x="3" y="5" width="3" height="2" fill="#1e293b"/>
  <rect x="2" y="7" width="3" height="2" fill="#1e293b"/>
  
  <!-- Arms up right -->
  <rect x="26" y="5" width="3" height="2" fill="#1e293b"/>
  <rect x="27" y="7" width="3" height="2" fill="#1e293b"/>
  
  <!-- Head -->
  <rect x="8" y="6" width="16" height="2" fill="#1e293b"/>
  <rect x="7" y="8" width="18" height="2" fill="#1e293b"/>
  
  <!-- Eyes happy (curved effect with pixels) -->
  <rect x="9" y="10" width="3" height="2" fill="#ffffff"/>
  <rect x="20" y="10" width="3" height="2" fill="#ffffff"/>
  <rect x="10" y="11" width="2" height="1" fill="#1e293b"/>
  <rect x="21" y="11" width="2" height="1" fill="#1e293b"/>
  
  <!-- Beak open happy -->
  <rect x="14" y="12" width="4" height="3" fill="#f59e0b"/>
  
  <!-- Body -->
  <rect x="6" y="12" width="2" height="7" fill="#1e293b"/>
  <rect x="24" y="12" width="2" height="7" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="10" y="14" width="12" height="7" fill="#f1f5f9"/>
  <rect x="8" y="15" width="16" height="5" fill="#f1f5f9"/>
  
  <!-- Wings out -->
  <rect x="4" y="13" width="3" height="4" fill="#3b82f6"/>
  <rect x="25" y="13" width="3" height="4" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="7" y="19" width="18" height="3" fill="#1e293b"/>
  
  <!-- Feet -->
  <rect x="6" y="22" width="6" height="3" fill="#f59e0b"/>
  <rect x="20" y="22" width="6" height="3" fill="#f59e0b"/>
  <rect x="5" y="24" width="8" height="2" fill="#f59e0b"/>
  <rect x="19" y="24" width="8" height="2" fill="#f59e0b"/>
</svg>
