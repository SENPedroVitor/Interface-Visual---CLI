<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" image-rendering="pixelated">
  <!-- 8-bit Penguin - Eyes Closed (for blink animation) -->
  
  <!-- Headphones band -->
  <rect x="6" y="3" width="2" height="3" fill="#475569"/>
  <rect x="24" y="3" width="2" height="3" fill="#475569"/>
  <rect x="8" y="2" width="16" height="2" fill="#475569"/>
  
  <!-- Headphones ears -->
  <rect x="6" y="6" width="2" height="4" fill="#64748b"/>
  <rect x="24" y="6" width="2" height="4" fill="#64748b"/>
  
  <!-- Head -->
  <rect x="8" y="4" width="16" height="2" fill="#1e293b"/>
  <rect x="7" y="6" width="18" height="2" fill="#1e293b"/>
  
  <!-- Eyes CLOSED - horizontal lines -->
  <rect x="9" y="9" width="3" height="1" fill="#1e293b"/>
  <rect x="20" y="9" width="3" height="1" fill="#1e293b"/>
  
  <!-- Beak -->
  <rect x="14" y="11" width="4" height="2" fill="#f59e0b"/>
  
  <!-- Body sides -->
  <rect x="6" y="10" width="2" height="8" fill="#1e293b"/>
  <rect x="24" y="10" width="2" height="8" fill="#1e293b"/>
  
  <!-- Belly -->
  <rect x="10" y="13" width="12" height="7" fill="#f1f5f9"/>
  <rect x="8" y="14" width="16" height="5" fill="#f1f5f9"/>
  
  <!-- Wings -->
  <rect x="4" y="12" width="3" height="5" fill="#3b82f6"/>
  <rect x="25" y="12" width="3" height="5" fill="#3b82f6"/>
  
  <!-- Body bottom -->
  <rect x="7" y="18" width="18" height="4" fill="#1e293b"/>
  <rect x="9" y="20" width="14" height="2" fill="#1e293b"/>
  
  <!-- Feet -->
  <rect x="7" y="22" width="5" height="3" fill="#f59e0b"/>
  <rect x="20" y="22" width="5" height="3" fill="#f59e0b"/>
  <rect x="6" y="24" width="7" height="2" fill="#f59e0b"/>
  <rect x="19" y="24" width="7" height="2" fill="#f59e0b"/>
</svg>
